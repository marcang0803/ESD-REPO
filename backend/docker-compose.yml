networks:
  esd-net:
    driver: bridge
    name: esd-net

volumes:
  booking_db_data:
  class_db_data:
  user_db_data:
  wallet_db_data:
  kong_pgdata:

services:
# ─────────────────────────────────────────────
# Kong API Gateway & Database
# ─────────────────────────────────────────────
  #######################################
  # Postgres: Kong database
  #######################################
  kong-database:
    image: postgres:17.4
    restart: always
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kong_pgdata:/var/lib/postgresql/data
    networks:
      - esd-net

  #######################################
  # Kong database migration
  #######################################
  kong-migration:
    image: kong/kong-gateway:3.9
    command: "kong migrations bootstrap"
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: password
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - esd-net

  #######################################
  # Kong: The API Gateway
  #######################################
  kong:
    image: kong/kong-gateway:3.9
    restart: always
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: password
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_STATUS_LISTEN: "0.0.0.0:8100"
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    networks:
      - esd-net

  # ─────────────────────────────────────────────
  # RabbitMQ (Messaging)
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    networks:
      - esd-net
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: always

  # ─────────────────────────────────────────────
  # Booking DB + Service
  # ─────────────────────────────────────────────
  booking-db:
    image: mysql:8.0
    container_name: booking_db
    networks:
      - esd-net
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: booking
    ports:
      - "3310:3306"
    volumes:
      - booking_db_data:/var/lib/mysql
      - ./booking/booking.sql:/docker-entrypoint-initdb.d/booking.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always

  booking-service:
    build:
      context: ./booking
    container_name: booking_service
    networks:
      - esd-net
    ports:
      - "6005:5000"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:root@booking-db:3306/booking
    depends_on:
      booking-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  # ─────────────────────────────────────────────
  # Class DB + Service
  # ─────────────────────────────────────────────
  class-db:
    image: mysql:8.0
    container_name: class_db
    networks:
      - esd-net
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: classservice
    ports:
      - "3320:3306"
    volumes:
      - class_db_data:/var/lib/mysql
      - ./class-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always

  class-service:
    build:
      context: ./class-service
    container_name: class_service
    networks:
      - esd-net
    ports:
      - "5000:5000"
    environment:
      # FIX: db.py reads these env vars; defaults were wrong (password="password", db="classservice")
      DB_HOST: class-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: classservice
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      class-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  # ─────────────────────────────────────────────
  # User DB + Service
  # ─────────────────────────────────────────────
  user-db:
    image: mysql:8.0
    container_name: user_db
    networks:
      - esd-net
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_service_db
    ports:
      - "3340:3306"
    volumes:
      - user_db_data:/var/lib/mysql
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always

  user-service:
    build:
      context: ./user-service
    container_name: user_service
    networks:
      - esd-net
    ports:
      # FIX: user-service/run.py uses PORT=5001 internally; host 5010 maps to it
      - "5010:5001"
    environment:
      PORT: 5001
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: user-db
      DB_PORT: 3306
      DB_NAME: user_service_db
    depends_on:
      user-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    
    restart: always

  # ─────────────────────────────────────────────
  # Wallet DB + Service
  # ─────────────────────────────────────────────
  wallet-db:
    image: mysql:8.0
    container_name: wallet_db_svc
    networks:
      - esd-net
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wallet_db
      MYSQL_USER: wallet_user
      MYSQL_PASSWORD: wallet_pass
    ports:
      - "3307:3306"
    volumes:
      - wallet_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uwallet_user", "-pwallet_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always

  wallet-service:
    build:
      context: ./wallet-service
    container_name: wallet_service
    networks:
      - esd-net
    ports:
      - "5005:5000"
      - "50051:50051"
    environment:
      MYSQL_HOST: wallet-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: wallet_db
      MYSQL_USER: wallet_user
      MYSQL_PASSWORD: wallet_pass
      DATABASE_URL: mysql+pymysql://wallet_user:wallet_pass@wallet-db:3306/wallet_db
      INITIAL_CREDITS: 1000
      REST_PORT: 5000
      GRPC_PORT: 50051
    depends_on:
      wallet-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  # ─────────────────────────────────────────────
  # Payment Service (Stripe transfer endpoint)
  # ─────────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile.payment
    container_name: payment_service
    networks:
      - esd-net
    ports:
      - "5001:5001"
    env_file:
      - ./payment-service/key.env
    restart: always

  # ─────────────────────────────────────────────
  # Pay Provider (RabbitMQ consumer + payout orchestrator)
  # ─────────────────────────────────────────────
  pay-provider:
    build:
      context: ./payment-service
      dockerfile: Dockerfile.provider
    container_name: pay_provider
    networks:
      - esd-net
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      # FIX: use container-name URLs, not localhost
      USER_SERVICE_URL: http://user-service:5001
      PAYMENT_SERVICE_URL: http://payment-service:5001
    depends_on:
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      payment-service:
        condition: service_started
    restart: always

  # ─────────────────────────────────────────────
  # Notification Service
  # ─────────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
    container_name: notification_service
    networks:
      - esd-net
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: always

  # ─────────────────────────────────────────────
  # Book Class Composite (Scenario 1 orchestrator)
  # ─────────────────────────────────────────────
  book-class-composite:
    build:
      context: ./book-class-composite
    container_name: book_class_composite
    networks:
      - esd-net
    ports:
      - "5003:5003"
    environment:
      CLASS_SERVICE_URL: http://class-service:5000
      BOOKING_SERVICE_URL: http://booking-service:5000
      # FIX: user-service internal port is 5001
      USER_SERVICE_URL: http://user-service:5001
      WALLET_GRPC_HOST: wallet-service
      WALLET_GRPC_PORT: 50051
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
      class-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    restart: always

  # ─────────────────────────────────────────────
  # Cancel Booking Composite (Scenario 2 orchestrator)
  # ─────────────────────────────────────────────
  cancel-booking-composite:
    build:
      context: ./cancel-booking-composite
    container_name: cancel_booking_composite
    networks:
      - esd-net
    ports:
      - "5004:5004"
    environment:
      BOOKING_SERVICE_URL: http://booking-service:5000
      CLASS_SERVICE_URL: http://class-service:5000
      # FIX: user-service internal port is 5001
      USER_SERVICE_URL: http://user-service:5001
      WALLET_GRPC_HOST: wallet-service
      WALLET_GRPC_PORT: 50051
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
      class-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    restart: always
