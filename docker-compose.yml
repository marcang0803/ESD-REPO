services:
  booking-db:
    image: mysql:8.0
    container_name: booking_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: booking
    ports:
      - "3310:3306"
    volumes:
      - booking_db_data:/var/lib/mysql
      - ./booking/booking.sql:/docker-entrypoint-initdb.d/booking.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always

  booking-service:
    build:
      context: ./booking
    container_name: booking_service
    ports:
      - "6005:5000"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:root@booking-db:3306/booking
    depends_on:
      booking-db:
        condition: service_healthy
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always

  cancel-booking-composite:
    build:
      context: ./cancel-booking-composite
    container_name: cancel_booking_composite
    ports:
      - "5004:5004"
    environment:
      BOOKING_SERVICE_URL: http://booking-service:5000
      CLASS_SERVICE_URL: http://class-service:5000
      USER_SERVICE_URL: http://user-service:5001
      WALLET_GRPC_HOST: wallet-service
      WALLET_GRPC_PORT: 50051
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: always

volumes:
  booking_db_data:

